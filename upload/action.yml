name: "Adaptive Artifacts: Upload"
inputs:
  name:
    description: Artifact name
    required: true
    type: string
  path:
    description: File/directory or glob to upload
    required: true
    type: string
  if-no-files-found:
    required: false
    default: error
    options: [error, warn, ignore]
  overwrite:
    required: false
    default: false
    type: boolean
  clean:
    required: false
    default: false
    type: boolean
  max-size-mb:
    required: false
    type: number
  retention-days:
    required: false
    type: number
  act-root:
    required: false
    default: .act/artifacts
    type: string

runs:
  using: composite
  steps:
    - name: Upload via GitHub artifact service
      if: ${{ env.ACT != 'true' && env.ACTIONS_RUNTIME_TOKEN != '' && env.ACTIONS_RUNTIME_URL != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
        compression-level: ${{ inputs.compression-level }}
        overwrite: ${{ inputs.overwrite }}
        retention-days: ${{ inputs.retention-days }}

    - name: Fallback to ACT simulation
      if: ${{ env.ACT == 'true' || env.ACTIONS_RUNTIME_TOKEN == '' || env.ACTIONS_RUNTIME_URL == '' }}
      uses: ./act-upload
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
        overwrite: ${{ inputs.overwrite }}
        act-root: ${{ inputs.act-root }}
