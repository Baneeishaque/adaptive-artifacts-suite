name: "Adaptive Artifacts: Download"
inputs:
  name:
    required: true
    type: string
  path:
    required: true
    type: string
  merge-multiple:
    required: false
    default: false
    type: boolean
  clean:
    required: false
    default: false
    type: boolean
  act-root:
    required: false
    default: .act/artifacts
    type: string

runs:
  using: composite
  steps:
    - name: Download via GitHub artifact service
      if: ${{ env.ACT != 'true' && env.ACTIONS_RUNTIME_TOKEN != '' && env.ACTIONS_RUNTIME_URL != '' }}
      uses: actions/download-artifact@v5
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        merge-multiple: ${{ inputs.merge-multiple }}

    - name: Fallback to ACT simulation
      if: ${{ env.ACT == 'true' || env.ACTIONS_RUNTIME_TOKEN == '' || env.ACTIONS_RUNTIME_URL == '' }}
      uses: ./act-download
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        clean: ${{ inputs.clean }}
        act-root: ${{ inputs.act-root }}
