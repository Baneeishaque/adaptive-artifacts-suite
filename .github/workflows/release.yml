name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  verify-and-update-major:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify action JS committed (no untracked build output)
        run: |
          # Nothing to build; Node actions are plain JS. Ensure repo clean.
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::Working tree not clean at release time"
            git status --porcelain
            exit 1
          fi

      - name: Update major tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const m = tag.match(/^v(\d+)\.\d+\.\d+$/);
            if (!m) core.setFailed(`Tag ${tag} must be vMAJOR.MINOR.PATCH`);
            const major = `v${m[1]}`;
            core.info(`Pointing ${major} -> ${tag}`);
            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${major}`,
              sha: context.sha,
              force: true
            });
